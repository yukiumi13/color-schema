# ============================================================
#  SEMANTIC LAYER — everything below references ramp.*
# ============================================================

surface:
  _meta:
    use: "page / module backgrounds (4 levels, light → darker)"
    pairs_with: [text, border]
    description: "bg is page-level; subtle/muted/emphasis are module-level. Pair every surface with a text token to guarantee contrast."
  bg:         "${base.white}"
  subtle:     "${ramp.slate_50}"
  muted:      "${ramp.slate_100}"
  emphasis:   "${ramp.slate_200}"

border:
  _meta:
    use: "module borders / dividers"
    pairs_with: [surface]
  subtle:     "${ramp.slate_200}"
  default:    "${ramp.slate_300}"
  strong:     "${ramp.slate_500}"

text:
  _meta:
    use: "foreground text (hierarchical)"
    pairs_with: [surface]
    description: "primary > secondary > muted in emphasis; inverse is white-on-dark for inverted surfaces."
  primary:    "${ramp.slate_900}"
  secondary:  "${ramp.slate_600}"
  muted:      "${ramp.slate_400}"
  inverse:    "${base.white}"

line:
  _meta:
    use: "chart lines: arrows / grid / axis"
    pairs_with: [surface, text]
  arrow:      "${border.strong}"
  grid:       "${ramp.slate_100}"
  axis:       "${border.default}"

# ---- universal UI status (success / warn / danger / info) -----------
# These four are the only role-bound colors that live in core, because
# their meaning is consistent across every product / paper / dashboard.
# Project-narrative roles (ours / baseline / highlight) belong in a
# per-project overlay, not here.
status:
  _meta:
    use: "universal UI status — success / warning / danger / info"
    pairs_with: [text.inverse, surface.bg]
    description: "stable UI vocabulary; pair with text.inverse on a filled chip, or use the same color as a border with surface.bg as the fill."
  success:    "${ramp.emerald_500}"
  warning:    "${ramp.amber_500}"
  danger:     "${ramp.red_500}"
  info:       "${ramp.cyan_500}"

# ============================================================
#  DATA VIZ — categorical / sequential / diverging
# ============================================================

# Categorical series (up to 8 distinguishable at a glance).
# Order tuned so adjacent pairs are hue-distant for small-N plots.
series:
  _meta:
    use: "categorical data viz, ≤ 8 classes (lines / grouped bars / scatter)"
    pairs_with: [text.primary, surface.bg]
    description: "hue-distance maximized; pick s1, s2, s3 in order — don't cherry-pick (e.g. avoid s1+s5 only). s1 == method.ours so 'Ours' is the same blue everywhere."
  s1:         "${ramp.blue_600}"
  s2:         "${ramp.orange_500}"
  s3:         "${ramp.emerald_500}"
  s4:         "${ramp.violet_500}"
  s5:         "${ramp.red_500}"
  s6:         "${ramp.cyan_500}"
  s7:         "${ramp.amber_500}"
  s8:         "${ramp.rose_500}"

# Sequential palettes — use for heatmaps, ordinal categories,
# single-variable gradients. 5 stops each; matplotlib will interp.
sequential:
  _meta:
    use: "heatmaps / single-variable gradients / ordered categories"
    pairs_with: [text.primary]
    description: "use the whole ramp — don't pick a single stop. 5 stops each; matplotlib interpolates between them. light → dark encodes magnitude."
  blue:       ["${ramp.blue_100}",    "${ramp.blue_300}",    "${ramp.blue_500}",    "${ramp.blue_700}",    "${ramp.blue_900}"]
  emerald:    ["${ramp.emerald_100}", "${ramp.emerald_300}", "${ramp.emerald_500}", "${ramp.emerald_700}", "${ramp.emerald_900}"]
  orange:     ["${ramp.orange_100}",  "${ramp.orange_300}",  "${ramp.orange_500}",  "${ramp.orange_700}",  "${ramp.orange_900}"]
  slate:      ["${ramp.slate_100}",   "${ramp.slate_300}",   "${ramp.slate_500}",   "${ramp.slate_700}",   "${ramp.slate_900}"]

# Diverging palettes — use for signed data (gain/loss, correlation).
# Odd number of stops; middle is neutral (near-white).
diverging:
  _meta:
    use: "signed data: gain/loss, correlation, residuals"
    pairs_with: [text.primary]
    description: "midpoint is neutral (near-white); ends carry opposite meaning. Cool (blue) usually = negative/decrease, warm (red/orange) = positive/increase."
  redblue:    ["${ramp.red_700}", "${ramp.red_300}",  "${base.white}", "${ramp.blue_300}",    "${ramp.blue_700}"]
  orangeblue: ["${ramp.orange_700}", "${ramp.orange_300}", "${base.white}", "${ramp.blue_300}", "${ramp.blue_700}"]
  redgreen:   ["${ramp.red_700}", "${ramp.red_300}",  "${base.white}", "${ramp.emerald_300}", "${ramp.emerald_700}"]

# ============================================================
#  TYPOGRAPHY
# ============================================================
font:
  _meta:
    use: "typography: family / size / weight"
    pairs_with: [text]
    description: "family is a fallback list (mpl, figma); family_ppt is a single name (PowerPoint doesn't support fallback chains)."
  family:      "Inter, Helvetica Neue, Aptos, Segoe UI, Arial, DejaVu Sans, sans-serif"
  family_ppt:  "Inter"
  family_mono: "JetBrains Mono, Menlo, Consolas, monospace"
  size_base:   10
  size_small:  8
  size_title:  11
  weight_body: 400
  weight_bold: 600
