  slate_700:  "#334155"
  slate_800:  "#1E293B"
  slate_900:  "#0F172A"
  slate_950:  "#020617"

  # ---- blue (primary brand) -----
  blue_50:    "#EFF6FF"
  blue_100:   "#DBEAFE"
  blue_200:   "#BFDBFE"
  blue_300:   "#93C5FD"
  blue_400:   "#60A5FA"
